<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Product | Seller</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    
    <style type="text/css">
        /* --- EXACT CEFAPEK MODAL DESIGN --- */
        .upload-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .popup-form {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 700px; /* Slightly wider to accommodate 3 columns */
            border: 1px solid #E2E8F0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
        }

        .popup-form-header {
            margin-bottom: 24px;
            border-bottom: 1px solid #E2E8F0;
            padding-bottom: 15px;
        }
        .popup-form-header h1 {
            font-size: 24px;
            color: #020817;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .popup-form-header p {
            font-size: 14px;
            color: #64748B;
            margin: 0;
        }

        .field-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .field-group .field {
            flex: 1;
            margin-bottom: 0;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }
        .field label {
            font-size: 14px;
            font-weight: 500;
            color: #020817;
        }
        
        /* Updated to include number and select inputs */
        .field input[type="text"],
        .field input[type="number"],
        .field select {
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            padding: 10px 15px;
            font-size: 14px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            background-color: #fff;
            color: #020817;
        }
        .field input::placeholder {
            color: #94A3B8;
        }

        /* --- CUSTOM FILE SELECT --- */
        .file-select {
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background-color: #f8fafc;
        }
        .custom-file-btn {
            background-color: white;
            border: 1px solid #E2E8F0;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #020817;
            cursor: pointer;
            transition: all 0.2s;
        }
        .custom-file-btn:hover {
            background-color: #F1F5F9;
        }
        .file-select p {
            font-size: 12px;
            color: #64748B;
            margin: 0;
        }

        /* --- SELECTED MEDIA PREVIEW --- */
        .selected-media p {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 14px;
            background-color: #ffffff;
        }
        .sm_close {
            cursor: pointer;
            color: #ef4444;
            font-size: 22px;
            font-weight: 600;
            line-height: 1;
        }
        .sm_close:hover {
            color: #dc2626;
        }

        /* --- SUBMIT BUTTON --- */
        .for-sub {
            width: 100%;
            padding: 12px;
            background-color: black;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }
        .for-sub:hover { opacity: 0.9; }
        .for-sub:disabled { opacity: 0.7; cursor: not-allowed; }
    </style> 
</head>
<body>

    <div id="page-content" style="display: none;">
        
        <div class="upload-container">
            <div class="popup-form">
                
                <div class="popup-form-header">
                    <div>
                        <h1>Upload New Product</h1>
                        <p>Fill in the details below to add a new product to your store catalog.</p>
                    </div>
                </div>

                <div id="uploadAlert" class="alert"></div>

                <form id="uploadForm" onsubmit="handleUploadSubmit(event)" enctype="multipart/form-data">
                    
                    <div class="field-group">
                        <div class="field">
                            <label>Product Name</label>
                            <input type="text" name="product_name" placeholder="e.g., Organic Apples" required>
                        </div>
                        <div class="field">
                            <label>Location</label>
                            <input type="text" name="location" placeholder="e.g., Kigali Center" required>
                        </div>
                    </div>

                    <div class="field-group">
                        <div class="field">
                            <label>Category</label>
                            <select name="category_id" required>
                                <option value="" disabled selected>Select Category</option>
                                <option value="1">Clothing</option>
                                <option value="2">Accessories</option>
                                <option value="3">Shoes</option>
                                <option value="4">Home</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Price ($)</label>
                            <input type="number" step="0.01" name="price" placeholder="0.00" required>
                        </div>
                        <div class="field">
                            <label>Discount (%)</label>
                            <input type="number" name="discount_percent" placeholder="0" min="0" max="100">
                        </div>
                    </div>

                    <div class="field">
                        <label>Product Photo (Required)</label>
                        <div class="file-select">
                            <label for="photo-upload" class="custom-file-btn">Choose an Image</label>
                            <p>JPEG, PNG, JPG</p>
                            <input type="file" name="photo" id="photo-upload" accept="image/*" required style="display: none;">
                        </div>
                        <div class="selected-media" id="selected-photo"></div>
                    </div>

                    <div class="field">
                        <label>Related Document (Optional)</label>
                        <div class="file-select">
                            <label for="doc-upload" class="custom-file-btn">Choose a Document</label>
                            <p>PDF, DOC, DOCX</p>
                            <input type="file" name="document" id="doc-upload" accept=".pdf,.doc,.docx" style="display: none;">
                        </div>
                        <div class="selected-media" id="selected-doc"></div>
                    </div>

                    <button type="submit" class="for-sub" id="submitBtn">Publish Product</button>
                </form>

            </div>
        </div>

    </div>

    <script src="js/app.js"></script>
    <script src="js/nav.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Load the sidebar layout
            loadDashboardLayout('Seller', 'upload', 'Seller Account');
            
            // Initialize CEFAPEK style file previews
            setupFilePreview('photo-upload', 'selected-photo', '🖼️');
            setupFilePreview('doc-upload', 'selected-doc', '📄');
        });

        // Generates the preview block with the red "X" when a file is selected
        function setupFilePreview(inputId, containerId, icon) {
            const fileInput = document.getElementById(inputId);
            const container = document.getElementById(containerId);
            
            if (!fileInput || !container) return;

            fileInput.addEventListener('change', function () {
                container.innerHTML = ''; 
                
                if (this.files[0]) {
                    const file = this.files[0];
                    
                    const filePreview = document.createElement('p');
                    filePreview.innerHTML = `
                        <span style="display:flex; align-items:center; gap:8px;">
                            <span style="font-size:18px;">${icon}</span> 
                            ${file.name}
                        </span>
                        <span class="sm_close">&times;</span>
                    `;

                    filePreview.querySelector('.sm_close').addEventListener('click', () => {
                        fileInput.value = ''; 
                        container.innerHTML = ''; 
                    });

                    container.appendChild(filePreview);
                }
            });
        }

        // Handle the robust form submission
        async function handleUploadSubmit(event) {
            event.preventDefault(); 
            
            const form = event.target;
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerText;
            
            btn.innerText = "Publishing...";
            btn.disabled = true;

            const formData = new FormData(form);

            try {
                const response = await apiCall('products.php?action=upload', 'POST', formData);

                if (response.status === 'success') {
                    showAlert('uploadAlert', response.message, 'success');
                    form.reset(); 
                    document.getElementById('selected-photo').innerHTML = ''; 
                    document.getElementById('selected-doc').innerHTML = '';   
                    
                    // Redirect back to products list after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = 'seller_products.html';
                    }, 1500);
                } else {
                    showAlert('uploadAlert', response.message, 'danger');
                }
            } catch (error) {
                showAlert('uploadAlert', 'A network error occurred.', 'danger');
            }
            
            btn.innerText = originalText;
            btn.disabled = false;
        }
    </script>
</body>
</html>
