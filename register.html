<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Meher E-Shopping</title>
    <link rel="stylesheet" href="css/global.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #020817;
            --soft-gray: #F8FAFC;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #fff;
            color: var(--primary-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
            box-sizing: border-box;
        }

        /* --- NAVBAR --- */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 25px 0; background: #fff; }
        .navbar h2 { font-size: 26px; font-weight: 700; margin: 0; letter-spacing: -0.5px;}
        .navbar h2 a { color: inherit; text-decoration: none; }
        .nav-links { display: flex; gap: 35px; align-items: center;}
        .nav-links a { text-decoration: none; color: var(--primary-dark); font-size: 14px; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: var(--text-muted); }
        .nav-actions { display: flex; align-items: center; gap: 15px;}
        .nav-actions .btn-rounded { border: 1px solid var(--border-color); padding: 10px 24px; border-radius: 50px; text-decoration: none; color: var(--primary-dark); font-weight: 500; font-size: 14px; transition: all 0.3s;}
        .nav-actions .btn-rounded:hover { background: var(--soft-gray); }

        /* --- AUTH WRAPPER (Split Layout) --- */
        .auth-wrapper {
            display: flex;
            flex: 1; /* Takes up all remaining height below the navbar */
            width: 100%;
        }

        /* --- LEFT SIDE IMAGE --- */
        .auth-image {
            flex: 1;
            background-image: url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1200'); /* Beautiful store/boutique vibe */
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        /* Dark overlay for text on image */
        .auth-image::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.7));
        }

        .auth-image-text {
            position: absolute;
            bottom: 60px;
            left: 60px;
            z-index: 1;
            color: white;
        }
        .auth-image-text h2 {
            font-size: 36px;
            font-weight: 600;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }
        .auth-image-text p {
            font-size: 16px;
            opacity: 0.9;
            margin: 0;
            max-width: 400px;
        }

        /* --- RIGHT SIDE FORM --- */
        .auth-form-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fff;
            position: relative;
        }

        .auth-form-content {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            box-sizing: border-box;
        }

        .auth-title {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }
        
        .auth-subtitle {
            color: var(--text-muted);
            font-size: 15px;
            margin: 0 0 40px 0;
        }

        /* --- INPUTS --- */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--primary-dark);
        }
        
        /* Applies to text, password, and the role dropdown */
        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
            background-color: #fff;
            color: var(--primary-dark);
        }
        .form-control:focus {
            border-color: var(--primary-dark);
        }
        .form-control::placeholder {
            color: #94A3B8;
        }

        /* --- BUTTONS & LINKS --- */
        .btn-primary {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-dark);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 15px;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .auth-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }
        .auth-link {
            color: var(--primary-dark);
            font-weight: 600;
            text-decoration: none;
        }
        .auth-link:hover {
            text-decoration: underline;
        }

        /* --- ALERTS --- */
        .alert {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 14px;
            display: none;
            font-weight: 500;
        }
        .alert:not(:empty) { display: block; }
        .alert-success { background-color: #DCFCE7; color: #166534; border: 1px solid #BBF7D0; }
        .alert-danger { background-color: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }

        /* Responsive */
        @media (max-width: 900px) {
            .auth-image { display: none; }
        }
    </style>
</head>
<body>



    <div class="auth-wrapper">
        
        <div class="auth-image">
            <div class="auth-image-text">
                <h2>Join the Movement</h2>
                <p>Create an account to discover, buy, or sell premium eco-friendly products.</p>
            </div>
        </div>

        <div class="auth-form-container">
            <div class="auth-form-content">
                
                <h2 class="auth-title">Create an Account</h2>
                <p class="auth-subtitle">Join us today. Enter your details below. <a class="auth-subtitle" href="index.html"><strong>home</strong></a></p>
                
                <div id="registerAlert" class="alert"></div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" class="form-control" placeholder="Choose a username" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Create a strong password" required>
                    </div>

                    <div class="form-group">
                        <label for="role">Register As</label>
                        <select id="role" class="form-control" required>
                            <option value="" disabled selected>Select your account type</option>
                            <option value="Customer">Customer (Buy Products)</option>
                            <option value="Seller">Seller (Sell Products)</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn-primary">Sign Up</button>
                </form>

                <p class="auth-footer">
                    Already have an account? <a href="login.html" class="auth-link">Sign in here</a>
                </p>
                
            </div>
        </div>

    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = this.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "Registering...";
            btn.disabled = true;

            const requestData = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };

            const response = await apiCall('auth.php?action=register', 'POST', requestData);

            const alertBox = document.getElementById('registerAlert');

            if (response.status === 'success') {
                alertBox.className = 'alert alert-success';
                alertBox.innerText = response.message;
                
                // Clear the form
                this.reset();
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                alertBox.className = 'alert alert-danger';
                alertBox.innerText = response.message;
                
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
