<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products | Seller</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    
    <style type="text/css">
        /* --- HEADER STYLES --- */
        .products-header {
            display: flex; justify-content: space-between; align-items: center; margin: 0 20px;
        }
        .products-header h1 { color: #020817; font-size: 30px; font-weight: 600; }
        .products-header p { color: #64748B; font-size: 16px; font-weight: 400; }
        .products-header button {
            padding: 10px 16px; color: #F8FAFC; display: flex; gap: 10px; border: none;
            outline: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: opacity 0.2s;
        }
        .products-header button:hover { opacity: 0.9; }

        /* --- FILTER & SEARCH --- */
        .products-filter { display: flex; gap: 30px; align-items: center; margin: 20px; }
        .products-filter form { width: 100%; position: relative; display: flex; align-items: center; }
        .products-filter form input {
            width: 100%; border: 1px solid #E2E8F0; border-radius: 6px;
            padding: 8px 10px 8px 35px; font-size: 14px; outline: none;
        }
        .products-filter form input::placeholder { color: #64748B; }

        /* --- PRODUCTS GRID --- */
        .products-contents { margin: 40px 20px 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

        /* --- PRODUCT CARD --- */
        .products-item {
            width: 100%; position: relative; overflow: hidden; border: 1px solid #E2E8F0;
            border-radius: 8px; box-shadow: 0 1px 2px 0 #0000000D; padding: 10px 15px 0;
            display: flex; flex-direction: column; background-color: white;
        }
        .products-item-thumbnail { width: calc(100% - 10px); aspect-ratio: 16 / 11; overflow: hidden; position: relative; margin: 0 5px; border-radius: 6px; }
        .products-item-thumbnail img {
            z-index: 1; position: absolute; top: 50%; left: 50%; width: auto; height: 100%;
            transform: translate(-50%, -50%); min-width: 100%; min-height: 100%; object-fit: cover;
        }

        /* --- PRODUCT TEXT --- */
        .products-item-text { display: flex; flex-direction: column; gap: 10px; margin: 15px 0 10px; flex-grow: 1; }
        .products-item-text-header { display: flex; justify-content: space-between; align-items: center; }
        .products-item-text-header p.badge-seller {
            padding: 5px 14px; border-radius: 100px; font-weight: 500; font-size: 12px;
            border: 1px solid #E2E8F0; color: #020817; margin: 0;
        }
        .products-item-text-body h2 { font-size: 16px; color: #020817; font-weight: 500; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .products-item-text-body p { font-size: 14px; color: #64748B; font-weight: 400; margin: 0; }
        
        .price-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .price-row .price { font-weight: 600; color: #020817; }
        .price-row .discount { background: #EA580C; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }

        /* --- CARD FOOTER --- */
        .products-item-text-footer {
            padding: 13px 24px; background-color: #F1F5F980; border-top: 1px solid #E2E8F0;
            display: flex; align-items: center; justify-content: space-between; margin: 0 -15px; 
        }
        .products-item-text-footer button {
            display: flex; gap: 5px; color: #020817; font-size: 12px; background: none; border: none; cursor: pointer; padding: 0;
        }
        .products-item-text-footer button:hover { font-weight: 600; }
        .btn-delete { color: #FF0000 !important; }

        /* --- EDIT POPUP --- */
        .popup {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.4); display: none;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .popup.active { display: flex; }
        .popup-form {
            background-color: #fff; padding: 30px; border-radius: 8px; width: 90%; max-width: 600px;
        }
        .popup-form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .popup-form-header h1 { font-size: 24px; color: #020817; margin-bottom: 5px; }
        .close-btn { cursor: pointer; font-size: 28px; color: #020817; }
        
        .field-group { display: flex; gap: 20px; }
        .field-group .field { flex: 1; }
        .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .field label { font-size: 14px; font-weight: 500; color: #020817; }
        
        /* Updated inputs to match upload form */
        .field input[type="text"], 
        .field input[type="number"], 
        .field input[type="file"],
        .field select {
            border: 1px solid #E2E8F0; border-radius: 6px; padding: 10px;
            font-size: 14px; outline: none; width: 100%; box-sizing: border-box; background: white;
        }
        button.for-sub {
            width: 100%; padding: 12px; background-color: black; color: white;
            border: none; border-radius: 6px; font-size: 14px; cursor: pointer; margin-top: 10px;
        }

        /* --- DELETE CONFIRM MODAL --- */
        .custom-confirm-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.4); display: none;
            justify-content: center; align-items: center; z-index: 9999;
        } 
        .confirm-box {
            background-color: #fff; padding: 20px 25px; border-radius: 8px;
            max-width: 350px; width: 90%; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
            text-align: center; animation: fadeInUp 0.3s ease-out;
        }
        .confirm-box p { font-size: 16px; color: #333; margin-bottom: 20px; }
        .confirm-actions { display: flex; justify-content: space-between; gap: 10px; }
        .confirm-actions button { flex: 1; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; }
        .confirm-actions button.confirm-delete-btn { background-color: #dc3545; color: white; }
        .confirm-actions button.cancel-delete-btn { background-color: #6c757d; color: white; }
        @keyframes fadeInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="page-content" style="display: none;">
        
        <div class="products-header">
            <div>
                <h1>My Products</h1>
                <p>Manage, edit, and organize the products you are selling.</p>
            </div>
            <div>
                <button onclick="window.location.href='upload_product.html'" style="background: #020817;">
                    <span>Upload New Product</span>
                </button>
            </div>
        </div>

        <div class="products-filter">
            <form onsubmit="return false;">
                <span style="position: absolute; left: 12px; top: 9px; opacity: 0.5; font-size: 14px;">🔍</span>
                <input type="search" id="productSearchInput" placeholder="Search my products...">
            </form>
        </div>

        <div id="actionAlert" class="alert" style="margin: 0 20px;"></div>

        <div class="products-contents" id="productsGridContainer">
            <p style="grid-column: span 3; text-align: center; color: #64748B;">Loading your products...</p>
        </div>

        <div class="popup" id="editPopup">
            <div class="popup-form">
                <div class="popup-form-header">
                    <div>
                        <h1>Edit Product</h1>
                        <p style="font-size: 12px; color: #64748B; margin: 0;">Update the product details and media below.</p>
                    </div>
                    <div class="close-btn" onclick="closeEditPopup()">&times;</div>
                </div>
                
                <form id="editForm" onsubmit="handleEditSubmit(event)" enctype="multipart/form-data">
                    <input type="hidden" id="edit_id" name="id">
                    
                    <div class="field-group">
                        <div class="field">
                            <label>Product Name</label>
                            <input type="text" id="edit_name" name="product_name" required>
                        </div>
                        <div class="field">
                            <label>Location</label>
                            <input type="text" id="edit_location" name="location" required>
                        </div>
                    </div>

                    <div class="field-group">
                        <div class="field">
                            <label>Category</label>
                            <select id="edit_category" name="category_id" required>
                                <option value="" disabled>Select Category</option>
                                <option value="1">Clothing</option>
                                <option value="2">Accessories</option>
                                <option value="3">Shoes</option>
                                <option value="4">Home</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Price ($)</label>
                            <input type="number" step="0.01" id="edit_price" name="price" required>
                        </div>
                        <div class="field">
                            <label>Discount (%)</label>
                            <input type="number" id="edit_discount" name="discount_percent" min="0" max="100">
                        </div>
                    </div>

                    <div class="field">
                        <label>Update Photo (Optional)</label>
                        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 5px;">
                            <img id="edit_photo_preview" src="" alt="Current Photo" style="width: 50px; height: 50px; object-fit: cover; border-radius: 6px; border: 1px solid #E2E8F0; display: none;">
                            <input type="file" id="edit_photo" name="photo" accept="image/*" style="padding: 5px; flex-grow: 1;">
                        </div>
                    </div>

                    <div class="field">
                        <label>Update Document (Optional)</label>
                        <input type="file" id="edit_document" name="document" accept=".pdf,.doc,.docx" style="padding: 5px;">
                    </div>
                    
                    <button type="submit" class="for-sub">Save Changes</button>
                </form>
            </div>
        </div>

        <div id="confirmModal" class="custom-confirm-modal">
            <div class="confirm-box">
                <p id="confirmText">Are you sure you want to delete this product?</p>
                <div class="confirm-actions">
                    <button class="confirm-delete-btn">Yes, Delete</button>
                    <button class="cancel-delete-btn">Cancel</button>
                </div>
            </div>
        </div>

    </div>

    <script src="js/app.js"></script>
    <script src="js/nav.js"></script>
    <script>
        let allProducts = [];
        let productToDelete = null;

        document.addEventListener('DOMContentLoaded', () => {
            // Setup layout as Seller
            loadDashboardLayout('Seller', 'products', 'Seller Account');
            loadProducts();

            // Search filter
            const searchInput = document.getElementById('productSearchInput');
            if (searchInput) {
                searchInput.addEventListener('input', function() {
                    const searchTerm = this.value.toLowerCase();
                    const filteredProducts = allProducts.filter(p => 
                        p.product_name.toLowerCase().includes(searchTerm) || 
                        p.location.toLowerCase().includes(searchTerm)
                    );
                    renderProducts(filteredProducts);
                });
            }

            // EVENT DELEGATION FOR DELETE MODAL
            document.body.addEventListener('click', async function(e) {
                if (e.target.classList.contains('cancel-delete-btn')) {
                    const modal = document.getElementById('confirmModal');
                    if (modal) modal.style.display = 'none';
                    productToDelete = null;
                }
                
                if (e.target.classList.contains('confirm-delete-btn')) {
                    const modal = document.getElementById('confirmModal');
                    if (modal) modal.style.display = 'none';
                    
                    if (!productToDelete) return;

                    try {
                        const response = await apiCall('products.php?action=delete', 'POST', { id: productToDelete });
                        showAlert('actionAlert', response.message, response.status === 'success' ? 'success' : 'danger');
                        if (response.status === 'success') loadProducts();
                    } catch (error) {
                        console.error(error);
                        showAlert('actionAlert', 'A network error occurred.', 'danger');
                    } finally {
                        productToDelete = null;
                    }
                }
            });
        });

        // --- FETCH LOGIC FOR SELLER ---
        async function loadProducts() {
            const response = await apiCall('products.php?action=my_products');
            if (response.status === 'success') {
                allProducts = response.data;
                renderProducts(allProducts);
            } else {
                document.getElementById('productsGridContainer').innerHTML = `<p style="color:red; grid-column: span 3; text-align: center;">Error: ${response.message}</p>`;
            }
        }

        function renderProducts(productsArray) {
            const container = document.getElementById('productsGridContainer');
            if (!container) return;
            container.innerHTML = '';

            if (productsArray.length === 0) {
                container.innerHTML = '<p style="grid-column: span 3; text-align: center; color: #64748B;">You have not uploaded any products yet.</p>';
                return;
            }

            productsArray.forEach(p => {
                const price = parseFloat(p.price || 0).toFixed(2);
                const discount = parseInt(p.discount_percent || 0);
                
                container.innerHTML += `
                    <div class="products-item">
                        <div class="products-item-thumbnail">
                            <img src="${p.photo_path}" alt="${p.product_name}">
                        </div>
                        <div class="products-item-text">
                            <div class="products-item-text-header">
                                <p class="badge-seller">Seller: You</p>
                                <span style="font-size: 12px; color: #64748B;">#${p.id}</span>
                            </div>
                            <div class="products-item-text-body">
                                <h2>${p.product_name}</h2>
                                <p>📍 ${p.location}</p>
                                <div class="price-row">
                                    <span class="price">$${price}</span>
                                    ${discount > 0 ? `<span class="discount">-${discount}%</span>` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="products-item-text-footer">
                            <button class="btn-edit" onclick="openEditPopup(${p.id}, '${p.product_name.replace(/'/g, "\\'")}', '${p.location.replace(/'/g, "\\'")}', '${p.photo_path}', '${p.price}', '${p.discount_percent}', '${p.category_id}')">
                                <img src="icons/edit.svg" alt="Edit"> Edit Post
                            </button>
                            <button class="btn-delete" onclick="triggerDelete(${p.id}, '${p.product_name.replace(/'/g, "\\'")}')">
                                <img src="icons/delete-g.svg" alt="Delete"> Delete
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // --- OPEN DELETE MODAL FUNCTION ---
        function triggerDelete(id, name) {
            productToDelete = id;
            const confirmText = document.getElementById('confirmText');
            const confirmModal = document.getElementById('confirmModal');
            
            if (confirmText) confirmText.innerText = `Are you sure you want to delete "${name}"?`;
            if (confirmModal) confirmModal.style.display = 'flex';
        }

        // --- UPDATED EDIT POPUP LOGIC ---
        function openEditPopup(id, name, location, photo_path, price, discount, category_id) {
            document.getElementById('edit_id').value = id;
            document.getElementById('edit_name').value = name;
            document.getElementById('edit_location').value = location;
            
            // Populate the new fields safely
            document.getElementById('edit_price').value = price && price !== 'null' ? price : '0.00';
            document.getElementById('edit_discount').value = discount && discount !== 'null' ? discount : '0';
            
            const catSelect = document.getElementById('edit_category');
            if (category_id && category_id !== 'null') {
                catSelect.value = category_id;
            } else {
                catSelect.value = ""; // Reset to default
            }
            
            const photoPreview = document.getElementById('edit_photo_preview');
            if(photoPreview && photo_path) {
                photoPreview.src = photo_path;
                photoPreview.style.display = 'block';
            } else if (photoPreview) {
                photoPreview.style.display = 'none';
            }

            document.getElementById('edit_photo').value = ''; 
            document.getElementById('edit_document').value = ''; 
            
            const editPopup = document.getElementById('editPopup');
            if (editPopup) {
                editPopup.classList.add('active');
                document.body.classList.add('no-scroll');
            }
        }

        function closeEditPopup() {
            const editPopup = document.getElementById('editPopup');
            if (editPopup) {
                editPopup.classList.remove('active');
                document.body.classList.remove('no-scroll');
            }
        }

        async function handleEditSubmit(event) {
            event.preventDefault(); 
            
            const form = event.target;
            const submitBtn = form.querySelector('button[type="submit"]');
            if (submitBtn) {
                submitBtn.innerText = "Saving...";
                submitBtn.disabled = true;
            }

            const formData = new FormData(form);
            const response = await apiCall('products.php?action=edit', 'POST', formData);
            
            showAlert('actionAlert', response.message, response.status === 'success' ? 'success' : 'danger');
            closeEditPopup();
            
            if(response.status === 'success') loadProducts(); 
            
            if (submitBtn) {
                submitBtn.innerText = "Save Changes";
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
