<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Meher E-Shopping</title>
    <link rel="stylesheet" href="css/global.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #020817;
            --soft-gray: #F8FAFC;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #fff;
            color: var(--primary-dark);
            height: 100vh;
            display: flex;
            overflow: hidden; /* Prevents scrolling on desktop */
        }

        /* --- SPLIT LAYOUT --- */
        .auth-image {
            flex: 1;
            background-image: url('https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?q=80&w=1200'); /* High-end eco-fashion vibe */
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        /* Dark overlay for text on image */
        .auth-image::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.6));
        }

        .auth-image-text {
            position: absolute;
            bottom: 60px;
            left: 60px;
            z-index: 1;
            color: white;
        }
        .auth-image-text h2 {
            font-size: 36px;
            font-weight: 600;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }
        .auth-image-text p {
            font-size: 16px;
            opacity: 0.9;
            margin: 0;
            max-width: 400px;
        }

        /* --- FORM SECTION --- */
        .auth-form-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fff;
            position: relative;
        }

        .auth-form-content {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            box-sizing: border-box;
        }

        .brand-logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-dark);
            text-decoration: none;
            letter-spacing: -0.5px;
            display: inline-block;
            margin-bottom: 50px;
        }

        .auth-title {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }
        
        .auth-subtitle {
            color: var(--text-muted);
            font-size: 15px;
            margin: 0 0 40px 0;
        }

        /* --- INPUTS --- */
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--primary-dark);
        }
        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px; /* Smoother, larger radius */
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary-dark);
        }
        .form-control::placeholder {
            color: #94A3B8;
        }

        /* --- BUTTONS & LINKS --- */
        .btn-primary {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-dark);
            color: white;
            border: none;
            border-radius: 50px; /* Pill shape */
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 10px;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .auth-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }
        .auth-link {
            color: var(--primary-dark);
            font-weight: 600;
            text-decoration: none;
        }
        .auth-link:hover {
            text-decoration: underline;
        }

        /* --- ALERTS --- */
        .alert {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 14px;
            display: none;
            font-weight: 500;
        }
        .alert:not(:empty) { display: block; }
        .alert-success { background-color: #DCFCE7; color: #166534; border: 1px solid #BBF7D0; }
        .alert-danger { background-color: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }

        /* Responsive */
        @media (max-width: 900px) {
            .auth-image { display: none; } /* Hide image on mobile for clean form view */
            body { overflow: auto; height: auto; min-height: 100vh; }
        }
    </style>
</head>
<body>

    <div class="auth-image">
        <div class="auth-image-text">
            <h2>Discover Sustainable<br>Excellence</h2>
            <p>Log in to access your curated eco-friendly collection and manage your preferences.</p>
        </div>
    </div>

    <div class="auth-form-container">
        <div class="auth-form-content">
            
            <a href="index.html" class="brand-logo">Prince Eshop.</a>
            
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Please enter your details to sign in. <a class="auth-subtitle" href="index.html"><strong>home</strong></a></p>
            
            <div id="loginAlert" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-primary">Sign in</button>
            </form>

            <p class="auth-footer">
                Don't have an account? <a href="register.html" class="auth-link">Sign up</a>
            </p>
            
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = this.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "Signing in...";
            btn.disabled = true;

            const requestData = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            const response = await apiCall('auth.php?action=login', 'POST', requestData);

            const alertBox = document.getElementById('loginAlert');

            if (response.status === 'success') {
                alertBox.className = 'alert alert-success';
                alertBox.innerText = response.message;
                
                setTimeout(() => {
                    window.location.href = response.redirect;
                }, 1000);
            } else {
                alertBox.className = 'alert alert-danger';
                alertBox.innerText = response.message;
                
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
