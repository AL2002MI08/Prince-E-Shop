<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard | Prince E-Shopping</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    
    <style type="text/css">
        /* --- HEADER STYLES --- */
        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 20px;
        }
        .products-header h1 {
            color: #020817;
            font-size: 30px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .products-header p {
            color: #64748B;
            font-size: 16px;
            font-weight: 400;
            margin: 0;
        }
        .products-header button {
            padding: 10px 16px;
            background-color: black;
            color: #F8FAFC;
            display: flex;
            align-items: center;
            gap: 10px;
            border: none;
            outline: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .products-header button:hover {
            opacity: 0.9;
        }

        /* --- FILTER / SEARCH --- */
        .products-filter {
            display: flex;
            gap: 30px;
            align-items: center;
            margin: 20px;
            justify-content: flex-end;
        }
        .products-filter form {
            width: 350px;
            position: relative;
            display: flex;
            align-items: center;
        }
        .products-filter form input {
            width: 100%;
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            padding: 8px 10px 8px 35px; /* Left padding for icon */
            font-size: 14px;
            outline: none;
        }
        .products-filter form input::placeholder {
            color: #64748B;
        }
        .products-filter form .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
            font-size: 14px;
        }

        /* --- GRID & CARDS (MATCHING PARTNERS DASH) --- */
        .products-contents {
            margin: 40px 20px 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .product-card {
            border: 1px solid #E2E8F0;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            position: relative;
            background-color: #fff;
            display: flex;
            flex-direction: column;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
        }
        .product-header p {
            padding: 5px 14px;
            border: 1px solid #E2E8F0;
            font-size: 12px;
            border-radius: 100px;
            margin: 0;
            color: #020817;
            background-color: #F8FAFC;
        }

        .product-img {
            width: 100%;
            aspect-ratio: 16 / 11; 
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8fafc;
            margin-top: 10px;
            border-radius: 6px;
            min-height: 180px; 
        }
        
        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            position: relative;
            z-index: 1;
        }

        /* NEW: Discount Badge for the Image */
        .discount-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #EA580C;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            z-index: 2;
        }

        .product-text {
            margin-top: 10px;
            display: flex;
            align-items: center;
            flex-direction: column;
            text-align: center;
            gap: 8px;
            flex-grow: 1;
        }
        .product-text h6 {
            color: #020817;
            font-weight: 600;
            width: 90%;
            margin: 0;
            font-size: 16px;
        }
        .product-text p {
            color: #64748B;
            font-weight: 400;
            font-size: 14px;
            width: 70%;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.5;
            margin: 0;
        }

        /* NEW: Price styling */
        .price-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 5px;
            margin-bottom: 5px;
        }
        .price-row .current-price {
            font-size: 16px;
            font-weight: 700;
            color: #020817;
        }
        .price-row .original-price {
            font-size: 13px;
            color: #94A3B8;
            text-decoration: line-through;
        }

        .product-footer {
            padding: 13px 24px;
            background-color: #F1F5F980;
            border-top: 1px solid #E2E8F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px -10px -10px -10px; 
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
        }
        .product-footer a {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #020817;
            text-decoration: none;
        }
        .product-footer a:hover {
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div id="page-content" style="display: none;">
        
        <div class="products-header">
            <div>
                <h1>My Products</h1>
                <p>Manage, view, and organize your uploaded products.</p>
            </div>
            <div>
                <button onclick="window.location.href='upload_product.html'">
                    <span> Upload New Product</span>
                </button>
            </div>
        </div>

        <div class="products-filter">
            <form onsubmit="return false;">
                <span class="search-icon">🔍</span>
                <input type="search" id="searchInput" placeholder="Search Products...">
            </form>
        </div>

        <div id="productsGrid" class="products-contents">
            <p style="grid-column: span 3; text-align: center; color: #64748B;">Loading products...</p>
        </div>

    </div>

    <script src="js/app.js"></script>
    <script src="js/nav.js"></script>
    <script>
        let allProducts = [];

        document.addEventListener('DOMContentLoaded', async () => {
            // Setup dashboard layout
            if(typeof loadDashboardLayout === 'function') {
                loadDashboardLayout('Seller', 'dashboard', 'Seller Dashboard');
            } else {
                document.getElementById('page-content').style.display = 'block';
            }
            
            await fetchProducts();

            // Setup real-time search filtering
            document.getElementById('searchInput').addEventListener('input', function() {
                const term = this.value.toLowerCase();
                const filtered = allProducts.filter(p => 
                    p.product_name.toLowerCase().includes(term) || 
                    p.location.toLowerCase().includes(term)
                );
                renderProducts(filtered);
            });
        });

        async function fetchProducts() {
            const grid = document.getElementById('productsGrid');
            const response = await apiCall('products.php?action=my_products');
            
            if (response.status === 'success') {
                allProducts = response.data;
                renderProducts(allProducts);
            } else {
                grid.innerHTML = `<p style="grid-column: span 3; text-align: center; color: red;">Error: ${response.message}</p>`;
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = ''; 

            if (products.length === 0) {
                grid.innerHTML = '<p style="grid-column: span 3; text-align: center; color: #64748B;">No products found.</p>';
                return;
            }

            products.forEach(product => {
                // Formatting Prices & Discounts
                const price = parseFloat(product.price || 0).toFixed(2);
                const discount = parseInt(product.discount_percent || 0);
                
                let priceHTML = `<div class="price-row"><span class="current-price">$${price}</span></div>`;
                let discountBadge = '';

                if (discount > 0) {
                    const discountAmount = price * (discount / 100);
                    const finalPrice = (price - discountAmount).toFixed(2);
                    
                    discountBadge = `<div class="discount-badge">-${discount}%</div>`;
                    priceHTML = `
                        <div class="price-row">
                            <span class="original-price">$${price}</span>
                            <span class="current-price">$${finalPrice}</span>
                        </div>
                    `;
                }

                const docLink = product.document_path 
                    ? `<a href="${product.document_path}" target="_blank"><img src="icons/sidebar5.svg" alt="View Document"> <span>View Document</span></a>` 
                    : `<span style="font-size:12px; color:#94A3B8;">No Document</span>`;

                const cardHTML = `
                    <div class="product-card">
                        <div class="product-header">
                            <p>Product</p>
                        </div>

                        <div class="product-img">
                            ${discountBadge}
                            <img src="${product.photo_path}" alt="${product.product_name}">
                        </div>

                        <div class="product-text">
                            <h6>${product.product_name}</h6>
                            <p>📍 ${product.location}</p>
                            ${priceHTML}
                        </div>

                        <div class="product-footer">
                            ${docLink}
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }
    </script>
</body>
</html>
